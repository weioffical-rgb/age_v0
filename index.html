<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#eef4ff" />
  <title>實際年齡計算器</title>
  <style>
    :root {
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      color-scheme: light;
      --bg-1: #eef4ff;
      --bg-2: #f8fbff;
      --card: rgba(255, 255, 255, 0.94);
      --text: #172033;
      --muted: #697386;
      --primary: #4f6bed;
      --primary-dark: #3d56c5;
      --primary-soft: #eef1ff;
      --line: #d9dfeb;
      --danger: #c33b4a;
      --danger-soft: #fff0f2;
      --success: #167c5b;
      --shadow: 0 24px 70px rgba(74, 98, 160, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(108, 129, 255, 0.18), transparent 28%),
        radial-gradient(circle at 88% 82%, rgba(107, 210, 185, 0.16), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px 18px;
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      width: min(100%, 1080px);
    }

    .app-card {
      position: relative;
      overflow: hidden;
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .app-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 7px;
      background: linear-gradient(90deg, #4f6bed, #6c8cff, #68c9b5);
    }

    .header {
      padding: 30px 32px 22px;
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: linear-gradient(145deg, #4f6bed, #7290ff);
      box-shadow: 0 14px 30px rgba(79, 107, 237, 0.28);
      color: white;
    }

    .icon-wrap svg {
      width: 29px;
      height: 29px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.25rem);
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .content {
      padding: 0 32px 30px;
    }

    .today-chip {
      display: inline-flex;
      align-items: center;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(79, 107, 237, 0.09);
      color: var(--primary-dark);
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 22px;
      align-items: start;
    }

    .input-column {
      min-width: 0;
    }

    .entry-card {
      padding: 22px;
      border: 1px solid rgba(79, 107, 237, 0.14);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 26px rgba(79, 107, 237, 0.05);
    }

    .entry-card + .entry-card {
      margin-top: 16px;
    }

    .section-title {
      margin: 0;
      font-size: 1.16rem;
      font-weight: 900;
    }

    .section-description {
      margin: 7px 0 16px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #4e5b73;
      font-weight: 900;
    }

    .picker-input {
      width: 100%;
      height: 66px;
      padding: 0 17px;
      border: 1.5px solid var(--line);
      border-radius: 15px;
      background: white;
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .picker-input:hover,
    .number-input:hover {
      border-color: #b8c4dc;
    }

    .picker-input:focus,
    .number-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 107, 237, 0.13);
    }

    .date-grid {
      display: grid;
      grid-template-columns: 1.35fr 1fr 1fr;
      gap: 10px;
    }

    .number-input {
      width: 100%;
      height: 64px;
      padding: 0 10px;
      border: 1.5px solid var(--line);
      border-radius: 15px;
      background: white;
      color: var(--text);
      font-size: 1.42rem;
      font-weight: 900;
      text-align: center;
      transition: 0.2s ease;
    }

    .year-tools {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 9px;
    }

    .step-button {
      min-height: 38px;
      border: 1px solid #d8deee;
      border-radius: 10px;
      background: white;
      color: var(--primary-dark);
      font-weight: 900;
      cursor: pointer;
      transition: 0.16s ease;
      user-select: none;
      touch-action: manipulation;
    }

    .step-button:hover {
      background: var(--primary-soft);
      border-color: #bfc8e5;
    }

    .quick-years {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .quick-year-button {
      border: 0;
      border-radius: 999px;
      padding: 7px 10px;
      background: #f2f4f8;
      color: #4f5d75;
      font-size: 0.84rem;
      font-weight: 800;
      cursor: pointer;
    }

    .quick-year-button:hover {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .helper {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.5;
    }

    .action-row {
      display: flex;
      margin-top: 16px;
    }

    .primary-button,
    .secondary-button,
    .text-button {
      border: 0;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-button {
      width: 100%;
      min-height: 56px;
      padding: 0 26px;
      border-radius: 15px;
      background: linear-gradient(145deg, var(--primary), #6986ff);
      color: white;
      font-weight: 900;
      font-size: 1.04rem;
      box-shadow: 0 12px 26px rgba(79, 107, 237, 0.24);
    }

    .primary-button:hover {
      background: linear-gradient(145deg, var(--primary-dark), #5874e8);
      transform: translateY(-1px);
    }

    .error {
      display: none;
      margin-top: 14px;
      padding: 13px 15px;
      border-radius: 13px;
      background: var(--danger-soft);
      color: var(--danger);
      font-weight: 800;
      line-height: 1.5;
    }

    .result-column {
      position: sticky;
      top: 24px;
    }

    .result-card {
      min-height: 430px;
      padding: 26px;
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(239, 242, 255, 0.98), rgba(245, 255, 252, 0.98));
      border: 1px solid rgba(79, 107, 237, 0.14);
      box-shadow: 0 18px 38px rgba(79, 107, 237, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .result-top {
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .result-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .empty-state {
      margin-top: 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 18px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: rgba(79, 107, 237, 0.1);
      color: var(--primary);
    }

    .empty-icon svg {
      width: 32px;
      height: 32px;
    }

    .age-display {
      display: none;
      margin-top: 14px;
      flex-direction: column;
      gap: 12px;
    }

    .age-block {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .age-number {
      font-size: clamp(3rem, 7vw, 4.6rem);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: var(--primary-dark);
    }

    .age-unit {
      font-size: 1.18rem;
      font-weight: 900;
      color: #4c5870;
    }

    .result-detail {
      display: none;
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.92rem;
    }

    .result-actions {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .secondary-button {
      flex: 1;
      padding: 11px 14px;
      border-radius: 11px;
      background: white;
      color: var(--primary-dark);
      border: 1px solid #d8deee;
      font-weight: 900;
    }

    .secondary-button:hover {
      background: var(--primary-soft);
    }

    .text-button {
      padding: 11px 14px;
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
    }

    .text-button:hover {
      background: rgba(23, 32, 51, 0.05);
      color: var(--text);
    }

    .privacy-note {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(105, 115, 134, 0.14);
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.82rem;
    }

    .privacy-note svg {
      width: 17px;
      height: 17px;
      margin-top: 2px;
      flex: 0 0 auto;
      color: var(--success);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translate(-50%, 16px);
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(23, 32, 51, 0.92);
      color: white;
      font-weight: 800;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      box-shadow: 0 12px 30px rgba(23, 32, 51, 0.22);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 860px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .result-column {
        position: static;
      }

      .result-card {
        min-height: 330px;
      }

      .result-top {
        min-height: 190px;
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      .app-card {
        border-radius: 22px;
      }

      .header {
        padding: 26px 22px 18px;
        align-items: flex-start;
      }

      .icon-wrap {
        width: 50px;
        height: 50px;
        border-radius: 15px;
      }

      .content {
        padding: 0 22px 24px;
      }

      .date-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="app-card" aria-labelledby="pageTitle">
      <header class="header">
        <div class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M7 3v3M17 3v3M4.5 9h15M6 5h12a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            <path d="M8 13h3v3H8z" fill="currentColor" opacity=".9" />
          </svg>
        </div>
        <div>
          <h1 id="pageTitle">實際年齡計算器</h1>
          <p class="subtitle">選擇或輸入出生日期，結果會直接顯示在右側。</p>
        </div>
      </header>

      <div class="content">
        <div id="todayChip" class="today-chip"></div>

        <div class="main-layout">
          <div class="input-column">
            <section class="entry-card">
              <h2 class="section-title">選擇出生日期</h2>
              <p class="section-description">點選日期欄位後，從日曆中選擇個案的出生日期。</p>

              <div class="field">
                <label for="birthDatePicker">出生日期</label>
                <input id="birthDatePicker" class="picker-input" type="date" autocomplete="off" />
              </div>

              <p class="helper">選擇後會自動帶入下方的年、月、日欄位。</p>
            </section>

            <section class="entry-card">
              <h2 class="section-title">直接輸入年月日</h2>
              <p class="section-description">也可以直接輸入西元出生年、出生月與出生日。</p>

              <div class="date-grid">
                <div class="field">
                  <label for="birthYear">出生年</label>
                  <input
                    id="birthYear"
                    class="number-input"
                    type="number"
                    inputmode="numeric"
                    min="1900"
                    max="2100"
                    placeholder="1995"
                  />

                  <div class="year-tools" aria-label="快速調整年份">
                    <button class="step-button" type="button" data-year-step="-10">−10</button>
                    <button class="step-button" type="button" data-year-step="-1">−1</button>
                    <button class="step-button" type="button" data-year-step="1">＋1</button>
                    <button class="step-button" type="button" data-year-step="10">＋10</button>
                  </div>
                </div>

                <div class="field">
                  <label for="birthMonth">出生月</label>
                  <input
                    id="birthMonth"
                    class="number-input"
                    type="number"
                    inputmode="numeric"
                    min="1"
                    max="12"
                    placeholder="月"
                  />
                </div>

                <div class="field">
                  <label for="birthDay">出生日</label>
                  <input
                    id="birthDay"
                    class="number-input"
                    type="number"
                    inputmode="numeric"
                    min="1"
                    max="31"
                    placeholder="日"
                  />
                </div>
              </div>

              <div class="quick-years" aria-label="常用年齡快速選擇">
                <button class="quick-year-button" type="button" data-age="20">約 20 歲</button>
                <button class="quick-year-button" type="button" data-age="30">約 30 歲</button>
                <button class="quick-year-button" type="button" data-age="40">約 40 歲</button>
                <button class="quick-year-button" type="button" data-age="50">約 50 歲</button>
                <button class="quick-year-button" type="button" data-age="60">約 60 歲</button>
                <button class="quick-year-button" type="button" data-age="70">約 70 歲</button>
              </div>

              <p class="helper">
                年份可直接輸入；按住 ±1 或 ±10 可連續調整。滑鼠滾輪每格調整 1 年，按住 Shift 則調整 10 年。
              </p>
            </section>

            <div class="action-row">
              <button id="calculateButton" class="primary-button" type="button">
                計算實際年齡
              </button>
            </div>

            <div id="errorMessage" class="error" role="alert"></div>
          </div>

          <aside class="result-column">
            <section class="result-card" aria-live="polite">
              <div class="result-top">
                <p class="result-label">實足年齡</p>

                <div id="emptyState" class="empty-state">
                  <div class="empty-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                      <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8" />
                    </svg>
                  </div>
                  輸入出生日期後，計算結果會直接顯示在這裡。
                </div>

                <div id="ageDisplay" class="age-display">
                  <div class="age-block">
                    <span id="yearsNumber" class="age-number">0</span>
                    <span class="age-unit">年</span>
                  </div>

                  <div class="age-block">
                    <span id="monthsNumber" class="age-number">0</span>
                    <span class="age-unit">個月</span>
                  </div>
                </div>

                <p id="resultDetail" class="result-detail"></p>
              </div>

              <div>
                <div id="resultActions" class="result-actions">
                  <button id="copyButton" class="secondary-button" type="button">複製結果</button>
                  <button id="clearButton" class="text-button" type="button">清除</button>
                </div>

                <div class="privacy-note">
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M7 10V8a5 5 0 0 1 10 0v2M6 10h12a2 2 0 0 1 2 2v7H4v-7a2 2 0 0 1 2-2Z"
                      stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                  <span>出生日期只會在目前瀏覽器中計算，不會上傳或儲存。</span>
                </div>
              </div>
            </section>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">已複製結果</div>

  <script>
    function getTaipeiToday() {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(new Date());

      const values = {};
      for (const part of parts) {
        if (part.type !== "literal") values[part.type] = Number(part.value);
      }

      return {
        year: values.year,
        month: values.month,
        day: values.day
      };
    }

    function toISODate(date) {
      return `${date.year}-${String(date.month).padStart(2, "0")}-${String(date.day).padStart(2, "0")}`;
    }

    function formatDate(date) {
      return `${date.year} 年 ${date.month} 月 ${date.day} 日`;
    }

    function compareDates(a, b) {
      if (a.year !== b.year) return a.year - b.year;
      if (a.month !== b.month) return a.month - b.month;
      return a.day - b.day;
    }

    function isValidDate(year, month, day) {
      if (!Number.isInteger(year) || !Number.isInteger(month) || !Number.isInteger(day)) return false;
      const test = new Date(Date.UTC(year, month - 1, day));
      return (
        test.getUTCFullYear() === year &&
        test.getUTCMonth() === month - 1 &&
        test.getUTCDate() === day
      );
    }

    function calculateAge(birth, today) {
      let years = today.year - birth.year;
      let months = today.month - birth.month;

      if (today.day < birth.day) months -= 1;

      if (months < 0) {
        years -= 1;
        months += 12;
      }

      return { years, months };
    }

    const birthYear = document.getElementById("birthYear");
    const birthMonth = document.getElementById("birthMonth");
    const birthDay = document.getElementById("birthDay");
    const birthDatePicker = document.getElementById("birthDatePicker");
    const calculateButton = document.getElementById("calculateButton");
    const errorMessage = document.getElementById("errorMessage");
    const emptyState = document.getElementById("emptyState");
    const ageDisplay = document.getElementById("ageDisplay");
    const yearsNumber = document.getElementById("yearsNumber");
    const monthsNumber = document.getElementById("monthsNumber");
    const resultDetail = document.getElementById("resultDetail");
    const resultActions = document.getElementById("resultActions");
    const copyButton = document.getElementById("copyButton");
    const clearButton = document.getElementById("clearButton");
    const todayChip = document.getElementById("todayChip");
    const toast = document.getElementById("toast");

    let latestResultText = "";

    function refreshToday() {
      const today = getTaipeiToday();
      birthDatePicker.max = toISODate(today);
      birthYear.max = today.year;
      todayChip.textContent = `今天：${formatDate(today)}（台灣時間）`;
      return today;
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = "block";
    }

    function hideError() {
      errorMessage.textContent = "";
      errorMessage.style.display = "none";
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function getBirthFromManualFields() {
      const year = Number(birthYear.value);
      const month = Number(birthMonth.value);
      const day = Number(birthDay.value);

      if (!birthYear.value || !birthMonth.value || !birthDay.value) return null;
      return { year, month, day };
    }

    function syncPickerFromManual() {
      const birth = getBirthFromManualFields();
      if (!birth || !isValidDate(birth.year, birth.month, birth.day)) return;
      birthDatePicker.value = toISODate(birth);
    }

    function syncManualFromPicker() {
      if (!birthDatePicker.value) return;
      const [year, month, day] = birthDatePicker.value.split("-").map(Number);
      birthYear.value = year;
      birthMonth.value = month;
      birthDay.value = day;
    }

    function showResult(age, birth, today) {
      emptyState.style.display = "none";
      ageDisplay.style.display = "flex";
      resultDetail.style.display = "block";
      resultActions.style.display = "flex";

      yearsNumber.textContent = age.years;
      monthsNumber.textContent = age.months;
      resultDetail.textContent =
        `出生日期：${formatDate(birth)}\n計算基準日：${formatDate(today)}`;
    }

    function resetResult() {
      latestResultText = "";
      emptyState.style.display = "block";
      ageDisplay.style.display = "none";
      resultDetail.style.display = "none";
      resultActions.style.display = "none";
      yearsNumber.textContent = "0";
      monthsNumber.textContent = "0";
      resultDetail.textContent = "";
    }

    function runCalculation() {
      hideError();

      let birth = getBirthFromManualFields();

      if (!birth && birthDatePicker.value) {
        const [year, month, day] = birthDatePicker.value.split("-").map(Number);
        birth = { year, month, day };
      }

      if (!birth) {
        showError("請先選擇出生日期，或輸入完整的出生年、月、日。");
        return;
      }

      if (!isValidDate(birth.year, birth.month, birth.day)) {
        showError("出生日期格式不正確，請確認年月日是否為有效日期。");
        return;
      }

      const today = refreshToday();

      if (birth.year < 1900) {
        showError("目前僅接受 1900 年以後的出生日期。");
        return;
      }

      if (compareDates(birth, today) > 0) {
        showError("出生日期不可晚於今天。");
        return;
      }

      syncPickerFromManual();

      const age = calculateAge(birth, today);
      showResult(age, birth, today);

      latestResultText =
        `實足年齡：${age.years} 年 ${age.months} 個月（出生日期：${formatDate(birth)}；計算日：${formatDate(today)}）`;
    }

    function adjustYear(amount) {
      const today = getTaipeiToday();
      let current = Number(birthYear.value);

      if (!Number.isFinite(current) || !birthYear.value) {
        current = today.year - 30;
      }

      current = Math.min(today.year, Math.max(1900, current + amount));
      birthYear.value = current;
      syncPickerFromManual();

      if (birthMonth.value && birthDay.value) runCalculation();
    }

    function setupHoldButton(button) {
      const amount = Number(button.dataset.yearStep);
      let timer = null;
      let interval = null;

      const start = (event) => {
        event.preventDefault();
        adjustYear(amount);

        timer = setTimeout(() => {
          interval = setInterval(() => adjustYear(amount), 90);
        }, 420);
      };

      const stop = () => {
        clearTimeout(timer);
        clearInterval(interval);
        timer = null;
        interval = null;
      };

      button.addEventListener("pointerdown", start);
      button.addEventListener("pointerup", stop);
      button.addEventListener("pointerleave", stop);
      button.addEventListener("pointercancel", stop);
      button.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          adjustYear(amount);
        }
      });
    }

    document.querySelectorAll("[data-year-step]").forEach(setupHoldButton);

    document.querySelectorAll("[data-age]").forEach((button) => {
      button.addEventListener("click", () => {
        const today = getTaipeiToday();
        const age = Number(button.dataset.age);
        birthYear.value = today.year - age;
        syncPickerFromManual();

        if (birthMonth.value && birthDay.value) runCalculation();
        birthMonth.focus();
      });
    });

    birthYear.addEventListener("wheel", (event) => {
      event.preventDefault();
      const direction = event.deltaY < 0 ? 1 : -1;
      const step = event.shiftKey ? 10 : 1;
      adjustYear(direction * step);
    }, { passive: false });

    [birthYear, birthMonth, birthDay].forEach((input) => {
      input.addEventListener("input", () => {
        hideError();
        syncPickerFromManual();
      });

      input.addEventListener("change", () => {
        const birth = getBirthFromManualFields();
        if (birth && isValidDate(birth.year, birth.month, birth.day)) runCalculation();
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") runCalculation();
      });
    });

    birthDatePicker.addEventListener("change", () => {
      syncManualFromPicker();
      runCalculation();
    });

    calculateButton.addEventListener("click", runCalculation);

    copyButton.addEventListener("click", async () => {
      if (!latestResultText) return;

      try {
        await navigator.clipboard.writeText(latestResultText);
      } catch {
        const temp = document.createElement("textarea");
        temp.value = latestResultText;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
      }

      showToast("已複製結果");
    });

    clearButton.addEventListener("click", () => {
      birthYear.value = "";
      birthMonth.value = "";
      birthDay.value = "";
      birthDatePicker.value = "";
      hideError();
      resetResult();
      birthDatePicker.focus();
    });

    refreshToday();
    resetResult();
  </script>
</body>
</html>
